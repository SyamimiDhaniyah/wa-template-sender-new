name: Test Mac Setup

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Make script executable
        run: chmod +x setup-mac.sh

      - name: Run script
        run: ./setup-mac.sh
